<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Google Drive Access Authorization</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding-top: 100px; background: #f8f9fa; color: #333; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1a73e8; border-radius: 50%; width: 44px; height: 44px; animation: spin 1s linear infinite; margin: 24px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h2 { font-size: 18px; font-weight: bold; color: #1a73e8; }
    p { font-size: 13px; color: #666; line-height: 1.5; }
    #error-msg { color: #d93025; font-size: 12px; margin-top: 15px; display: none; font-weight: bold; }
  </style>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
  <h2>Google Picker Security Syncing...</h2>
  <div class="loader"></div>
  <p>안전하게 현재 슬라이드 문서 접근 권한을 동기화하고 있습니다.</p>
  <div id="error-msg"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetPresentationId = urlParams.get('id');
    const accessToken = urlParams.get('token'); // 💡 확장 프로그램 본체 토큰 주입받음
        
    const developerKey = "AIzaSyAmXkHDc5BjBRv_gvamTAMqmoY1YQCKh0c";

    window.onload = () => {
      if (!targetPresentationId || !accessToken) {
        showError("인증 파라미터가 누락되었습니다. 확장 프로그램을 다시 켜주세요.");
        return;
      }
      // 브라우저 팝업 차단 없이 즉시 구글 공식 피커 모달 로드
      gapi.load('picker', { 'callback': openTargetPicker });
    };

    function openTargetPicker() {
      try {
        const view = new google.picker.DocsView(google.picker.ViewId.PRESENTATIONS);
        view.setEnableSharedDrives(true); // 공유 드라이브 완벽 지원
        view.setFileIds([targetPresentationId]); // 타겟팅 파일 강제 포커싱

        const picker = new google.picker.PickerBuilder()
          .addView(view)
          .setOAuthToken(accessToken) // 🌟 중요: 확장 프로그램 본체의 ID 권한으로 피커를 승인합니다!
          .setDeveloperKey(developerKey)
          .setCallback((data) => {
            if (data.action === google.picker.Action.PICKED || data.action === google.picker.Action.CANCEL) {
              // 선택 완료 혹은 취소 시 창을 닫음 -> popup.js가 이를 감지하고 자동 새로고침 처리
              window.close();
            }
          })
          .build();
        picker.setVisible(true);
      } catch (e) {
        showError("피커 생성 오류: " + e.message);
      }
    }

    function showError(msg) {
      const errEl = document.getElementById('error-msg');
      if (errEl) {
        errEl.innerText = msg;
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
